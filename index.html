<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Loop RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
        }
        
        canvas {
            display: block;
        }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #ui-layer > * {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer"></div>
    
    <!-- Core Systems -->
    <script src="/js/core/StateManager.js"></script>
    <script src="/js/core/GameLoop.js"></script>
    
    <!-- Entities -->
    <script src="/js/entities/Player.js"></script>
    <script src="/js/entities/NPC.js"></script>
    
    <!-- Systems -->
    <script src="/js/systems/TimeLoop.js"></script>
    <script src="/js/systems/Dialogue.js"></script>
    <script src="/js/systems/SaveLoad.js"></script>
    
    <!-- Main Entry -->
    <script src="/js/main.js"></script>
</body>
</html>
